name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-appimage:
    name: Build (Linux, AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt update
          sudo apt install -y build-essential rsync wget

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.0
          dir: ..
          modules: qt5compat qtshadertools
          setup-python: false
          cache: true

      - name: Build AppImage
        run: |
          ./scripts/build-appimage.sh

      - name: Collect artifact
        run: |
          mkdir -p release
          mv ./*.AppImage release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cool-retro-term-appimage
          path: ./release/*

  build-dmg:
    name: Build (macOS, DMG)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.*
          modules: qt5compat qtshadertools
          setup-python: true
          python-version: '3.11'
          cache: true

      - name: Build DMG
        run: |
          JOBS="$(sysctl -n hw.ncpu)"
          ./scripts/build-dmg.sh

      - name: Collect artifact
        run: |
          mkdir -p release
          mv ./*.dmg release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cool-retro-term-dmg
          path: ./release/*

  build-windows:
    name: Build (Windows, zip)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qt5compat qtshadertools
          cache: true

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Shaders are embedded into the binary via app/qml/resources.qrc, so they
      # must be (re)compiled BEFORE qmake/nmake embed them as Qt resources.
      # qsb.exe is on PATH after jurplel/install-qt-action.
      - name: Compile shaders
        shell: cmd
        run: call compile_shaders.bat || exit /b 1

      # app.pro:    DESTDIR = $$OUT_PWD/../        -> cool-retro-term.exe at repo root
      # qmltermwidget.pro: DESTDIR = $$OUT_PWD/QMLTermWidget
      #   -> qmltermwidget\QMLTermWidget\qmltermwidget.dll (+ qmldir, scrollbar, schemes)
      - name: Build
        shell: cmd
        run: |
          qmake cool-retro-term.pro -spec win32-msvc CONFIG+=release || exit /b 1
          nmake || exit /b 1

      # The committed deploy/ folder is the verified release layout (full Qt 6.8.3
      # runtime + plugins, flat layout with the QMLTermWidget plugin under qml/).
      # We overlay the freshly built exe and terminal-widget DLL onto it rather than
      # reconstructing the DLL set with windeployqt. NOTE: keep Qt pinned at 6.8.3 so
      # the fresh binaries stay ABI-compatible with the committed deploy/ DLLs.
      - name: Assemble deploy folder
        shell: cmd
        run: |
          if not exist cool-retro-term.exe ( echo ERROR: cool-retro-term.exe not built & exit /b 1 )
          if not exist qmltermwidget\QMLTermWidget\qmltermwidget.dll ( echo ERROR: qmltermwidget.dll not built & exit /b 1 )
          xcopy /E /I /Y deploy deploy_out || exit /b 1
          copy /Y cool-retro-term.exe deploy_out\ || exit /b 1
          copy /Y qmltermwidget\QMLTermWidget\qmltermwidget.dll deploy_out\qml\QMLTermWidget\ || exit /b 1

      - name: Package as zip
        shell: pwsh
        run: Compress-Archive -Path deploy_out\* -DestinationPath cool-retro-term-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cool-retro-term-windows
          path: cool-retro-term-windows.zip

  release:
    name: Create Release
    runs-on: ubuntu-22.04
    needs:
      - build-appimage
      - build-dmg
      - build-windows
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: cool-retro-term-appimage
          path: ./release

      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: cool-retro-term-dmg
          path: ./release

      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: cool-retro-term-windows
          path: ./release

      # Move the `rolling` tag to the current commit via the REST API rather than
      # `git push -f`. A git push of the tag is scanned by GitHub's workflow-file
      # protection and is rejected when the workflow files at the target differ
      # from a branch (e.g. when two commits land close together) — the default
      # GITHUB_TOKEN lacks the `workflows` scope. The git/refs API only repoints
      # the tag at an already-pushed commit, so it isn't subject to that check.
      - name: Update rolling tag
        if: startsWith(github.ref, 'refs/heads/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PATCH "repos/${{ github.repository }}/git/refs/tags/rolling" \
            -f sha="${{ github.sha }}" -F force=true \
          || gh api -X POST "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/rolling" -f sha="${{ github.sha }}"

      - name: Publish rolling release
        if: startsWith(github.ref, 'refs/heads/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling
          name: Rolling Release
          prerelease: true
          files: ./release/*

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ./release/*
